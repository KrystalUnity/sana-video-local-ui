<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SANA Video Local UI social card</title>
  <desc id="desc">Promotional card for a local React and FastAPI workbench for SANA-Video 2B.</desc>
  <rect width="1200" height="630" fill="#080d0f"/>
  <rect x="44" y="44" width="1112" height="542" rx="24" fill="#11191b" stroke="#2d393b" stroke-width="2"/>
  <rect x="80" y="86" width="1040" height="64" rx="14" fill="#172124"/>
  <circle cx="112" cy="118" r="9" fill="#f46952"/>
  <circle cx="142" cy="118" r="9" fill="#f0b35a"/>
  <circle cx="172" cy="118" r="9" fill="#53d6a4"/>
  <text x="80" y="210" fill="#9ddbc3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="0">LOCAL VIDEO LAB</text>
  <text x="80" y="286" fill="#fff8e6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="66" font-weight="900" letter-spacing="0">SANA Video</text>
  <text x="80" y="352" fill="#fff8e6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="66" font-weight="900" letter-spacing="0">Local UI</text>
  <text x="82" y="406" fill="#d6d0c3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600" letter-spacing="0">React + FastAPI workbench for local video generation</text>

  <g transform="translate(80 462)">
    <rect width="176" height="44" rx="10" fill="#f07c2d"/>
    <text x="88" y="29" text-anchor="middle" fill="#1d1109" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="0">Start images</text>
  </g>
  <g transform="translate(274 462)">
    <rect width="210" height="44" rx="10" fill="#182629" stroke="#3b4b4c"/>
    <text x="105" y="29" text-anchor="middle" fill="#efe8dc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0">Chained segments</text>
  </g>
  <g transform="translate(502 462)">
    <rect width="154" height="44" rx="10" fill="#182629" stroke="#3b4b4c"/>
    <text x="77" y="29" text-anchor="middle" fill="#efe8dc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0">Low VRAM</text>
  </g>

  <g transform="translate(752 180)">
    <rect width="320" height="266" rx="18" fill="#0b0f11" stroke="#344044"/>
    <text x="26" y="44" fill="#fff8e6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="900" letter-spacing="0">Controls</text>
    <g transform="translate(26 78)">
      <text x="0" y="0" fill="#cfc8bb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0">Motion</text>
      <rect x="0" y="16" width="268" height="8" rx="4" fill="#293335"/>
      <rect x="0" y="16" width="92" height="8" rx="4" fill="#f07c2d"/>
    </g>
    <g transform="translate(26 128)">
      <text x="0" y="0" fill="#cfc8bb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0">Segments</text>
      <rect x="0" y="16" width="268" height="8" rx="4" fill="#293335"/>
      <rect x="0" y="16" width="142" height="8" rx="4" fill="#f07c2d"/>
    </g>
    <g transform="translate(26 178)">
      <text x="0" y="0" fill="#cfc8bb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0">Memory mode</text>
      <rect x="0" y="16" width="126" height="38" rx="10" fill="#172124" stroke="#53d6a4"/>
      <text x="63" y="41" text-anchor="middle" fill="#9ddbc3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0">Low VRAM</text>
    </g>
  </g>

  <text x="80" y="552" fill="#8da19b" font-family="Cascadia Mono, Consolas, monospace" font-size="22" font-weight="700" letter-spacing="0">github.com/KrystalUnity/sana-video-local-ui</text>
